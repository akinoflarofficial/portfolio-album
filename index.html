<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kara Kalem Sanatçısı | Nostaljik Portfolyo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script&display=swap" rel="stylesheet">
</head>
<body>

    <div class="table-surface">
        <div class="book" id="book">
            <div class="page cover-front" onclick="movePage(this, 1)">
                <div class="page-content">
                    <h1>KARA KALEM</h1>
                    <div class="ornament"></div>
                    <p>Aile Albümü Tadında Eskizler</p>
                    <span class="instruction">Açmak için tıklayın</span>
                </div>
            </div>

            <div class="page" onclick="movePage(this, 2)">
                <div class="page-content">
                    <h2 class="handwriting">Anılar ve Çizgiler</h2>
                    <p>Zamanın tozlu raflarından çıkan kareleri, kurşun kalemle yeniden hayata döndürüyoruz.</p>
                </div>
            </div>

            <div class="page" onclick="movePage(this, 3)">
                <div class="page-content">
                    <div class="photo-frame">
                        <img src="resim1.jpg" alt="Portre 1">
                    </div>
                    <p class="caption">Çalışma 1  <br><small>Kurşun Kalem ve Kömür</small></p>
                </div>
            </div>

            <div class="page" onclick="movePage(this, 4)">
                <div class="page-content">
                    <div class="photo-frame">
                        <img src="resim2.jpg" alt="Portre 2">
                    </div>
                    <p class="caption">Çalışma 2 <br><small>2B - 4B Grafit</small></p>
                </div>
            </div>

            <div class="page cover-back">
                <div class="page-content">
                    <h2 class="handwriting">İletişim</h2>
                    <p>akinoflarofficial@gmail.com</p>
                    <div class="ornament"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
